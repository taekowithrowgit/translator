<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日英対訳ツール Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
  :root {
    --ink: #1a1612; --paper: #f7f3ee; --paper-mid: #ede7de;
    --accent: #8b4a2f; --accent-light: #c47a5a; --rule: #c8b8a2;
    --shadow: rgba(26,22,18,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Noto Serif JP', serif; line-height: 1.6; }
  
  header { 
    background: var(--ink); color: var(--paper); padding: 15px 30px; 
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 4px solid var(--accent); position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-family: 'Lora', serif; font-size: 1.2rem; letter-spacing: 1px; }

  .controls { display: flex; gap: 10px; align-items: center; }
  select, input { 
    background: #2a2622; border: 1px solid var(--rule); color: white; 
    padding: 6px 10px; border-radius: 4px; font-size: 0.85rem;
  }

  main { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
  
  .card { 
    background: white; padding: 25px; border-radius: 8px; 
    box-shadow: 0 4px 15px var(--shadow); margin-bottom: 25px;
  }
  .label { font-size: 0.75rem; font-weight: bold; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; display: block; }
  
  #sourceText { font-size: 1.05rem; white-space: pre-wrap; margin-bottom: 20px; border-left: 3px solid var(--rule); padding-left: 15px; }

  table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
  th { background: var(--paper-mid); text-align: left; padding: 12px; font-size: 0.85rem; border-bottom: 2px solid var(--rule); }
  td { padding: 15px; border-bottom: 1px solid var(--rule); vertical-align: top; width: 50%; }
  tr:hover { background: #fdfcfb; }

  .row-num { color: var(--accent-light); font-family: 'Lora', serif; font-size: 0.8rem; margin-right: 8px; font-style: italic; }

  #loadingWrap { 
    display: none; position: fixed; inset: 0; background: rgba(247,243,238,0.9);
    flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
  }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--rule); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg { color: #b22222; background: #fff5f5; border: 1px solid #ffcccc; padding: 15px; border-radius: 6px; margin-top: 20px; }
  .btn-copy { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
  .btn-copy:hover { background: var(--ink); }

  @media (max-width: 600px) {
    td { display: block; width: 100%; }
    th { display: none; }
    td:first-child { background: #fcfaf8; border-bottom: none; font-weight: 600; }
  }
</style>
</head>
<body>

<header>
  <h1>Parallel Translator</h1>
  <div class="controls">
    <select id="modelSelect">
      <option value="gemini-1.5-flash" selected>Gemini 1.5 Flash (推奨)</option>
      <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
    </select>
    <input type="password" id="apiKey" placeholder="API Key" onchange="saveKey()">
  </div>
</header>

<main>
  <div class="card">
    <span class="label">Original Text</span>
    <div id="sourceText">※ テキストを選択してブックマークレットを起動してください。</div>
    <button id="translateBtn" class="btn-copy" onclick="doTranslate()">再翻訳する</button>
  </div>

  <div id="resultWrap" class="card" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <span class="label">Translation</span>
      <button class="btn-copy" onclick="copyTable()">表をコピー</button>
    </div>
    <div id="result"></div>
  </div>
</main>

<div id="loadingWrap">
  <div class="spinner"></div>
  <p style="margin-top:15px; font-weight:bold;">翻訳中...</p>
</div>

<script>
function saveKey() {
  localStorage.setItem('gemini_key', document.getElementById('apiKey').value);
}

window.onload = () => {
  const saved = localStorage.getItem('gemini_key');
  if (saved) document.getElementById('apiKey').value = saved;

  const params = new URLSearchParams(window.location.search);
  const text = params.get('text');
  if (text) {
    document.getElementById('sourceText').textContent = text;
    // テキストがある場合は自動的に翻訳を開始
    doTranslate();
  }
};

async function doTranslate() {
  const apiKey = document.getElementById('apiKey').value.trim() || localStorage.getItem('gemini_key');
  if (!apiKey) { alert('APIキーを設定してください'); return; }

  const text = document.getElementById('sourceText').textContent.trim();
  if (!text || text.startsWith('※')) return;

  const model = document.getElementById('modelSelect').value;
  const loadingWrap = document.getElementById('loadingWrap');
  const resultDiv = document.getElementById('result');
  const resultWrap = document.getElementById('resultWrap');

  loadingWrap.style.display = 'flex';
  resultWrap.style.display = 'none';

  const isJapanese = /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(text);
  const prompt = `Translate the following text into ${isJapanese ? 'English' : 'Japanese'}. 
  Break it into logical segments. Output ONLY valid JSON.
  Format: {"segments":[{"ja":"...", "en":"..."}]} 
  Text: ${text}`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { 
          temperature: 0.1,
          responseMimeType: "application/json" 
        }
      })
    });

    const data = await response.json();

    if (!response.ok) {
      if (response.status === 429) {
        const match = data.error?.message?.match(/retry in ([\d\.]+)s/);
        const wait = match ? Math.ceil(parseFloat(match[1])) : 30;
        throw new Error(`制限を超えました。あと ${wait} 秒ほど待ってから再実行してください。`);
      }
      throw new Error(data.error?.message || '翻訳に失敗しました');
    }

    const content = JSON.parse(data.candidates[0].content.parts[0].text);
    renderTable(content.segments);
    resultWrap.style.display = 'block';

  } catch (e) {
    resultDiv.innerHTML = `<div class="error-msg">⚠️ エラー: ${e.message}</div>`;
    resultWrap.style.display = 'block';
  } finally {
    loadingWrap.style.display = 'none';
  }
}

function renderTable(segments) {
  let html = `<table><thead><tr><th>日本語</th><th>English</th></tr></thead><tbody>`;
  segments.forEach((s, i) => {
    html += `<tr>
      <td><span class="row-num">${i+1}</span>${escHtml(s.ja)}</td>
      <td>${escHtml(s.en)}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('result').innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyTable() {
  const range = document.createRange();
  range.selectNode(document.getElementById('result'));
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand('copy');
  alert('表の内容をコピーしました');
}
</script>
</body>
</html>
