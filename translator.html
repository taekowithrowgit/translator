<script>
function saveKey() {
  localStorage.setItem('gemini_key', document.getElementById('apiKey').value);
}

window.onload = () => {
  const saved = localStorage.getItem('gemini_key');
  if (saved) document.getElementById('apiKey').value = saved;

  const params = new URLSearchParams(window.location.search);
  const text = params.get('text');
  if (text) {
    document.getElementById('sourceText').textContent = text;
    doTranslate();
  }
};

async function doTranslate() {
  const apiKey = document.getElementById('apiKey').value.trim() || localStorage.getItem('gemini_key');
  if (!apiKey) { alert('APIキーを設定してください'); return; }

  const text = document.getElementById('sourceText').textContent.trim();
  if (!text || text.startsWith('※')) return;

  // モデル名の正規化
  let modelName = document.getElementById('modelSelect').value;
  if (modelName === 'gemini-1.5-flash') modelName = 'gemini-1.5-flash-latest';

  const loadingWrap = document.getElementById('loadingWrap');
  const resultDiv = document.getElementById('result');
  const resultWrap = document.getElementById('resultWrap');

  loadingWrap.style.display = 'flex';
  resultWrap.style.display = 'none';

  const isJapanese = /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(text);
  const prompt = `Translate to ${isJapanese ? 'English' : 'Japanese'}. Output JSON only. Format: {"segments":[{"ja":"...", "en":"..."}]} Text: ${text}`;

  try {
    // v1 エンドポイントを使用することで安定性を向上
    const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/${modelName}:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { 
          temperature: 0.1,
          responseMimeType: "application/json" 
        }
      })
    });

    const data = await response.json();

    if (!response.ok) {
      if (response.status === 429) {
        const match = data.error?.message?.match(/retry in ([\d\.]+)s/);
        const wait = match ? Math.ceil(parseFloat(match[1])) : 30;
        throw new Error(`制限中です。あと ${wait} 秒待機してください。`);
      }
      throw new Error(data.error?.message || 'モデルが見つからないか、非対応です。');
    }

    const content = JSON.parse(data.candidates[0].content.parts[0].text);
    renderTable(content.segments);
    resultWrap.style.display = 'block';

  } catch (e) {
    resultDiv.innerHTML = `<div class="error-msg">⚠️ エラー: ${e.message}</div>`;
    resultWrap.style.display = 'block';
  } finally {
    loadingWrap.style.display = 'none';
  }
}

function renderTable(segments) {
  let html = `<table><thead><tr><th>日本語</th><th>English</th></tr></thead><tbody>`;
  segments.forEach((s, i) => {
    html += `<tr><td><span class="row-num">${i+1}</span>${escHtml(s.ja)}</td><td>${escHtml(s.en)}</td></tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('result').innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyTable() {
  const range = document.createRange();
  range.selectNode(document.getElementById('result'));
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand('copy');
  alert('コピーしました');
}
</script>
