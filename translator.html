<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parallel Translator Fast</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Lora:wght@400;600&display=swap');

:root{
    --ink:#1a1612;
    --paper:#f7f3ee;
    --paper-mid:#ede7de;
    --accent:#8b4a2f;
    --rule:#c8b8a2;
    --shadow:rgba(0,0,0,0.1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Serif JP',serif;
    line-height:1.7;
}

header{
    position:sticky;
    top:0;
    z-index:100;

    background:var(--ink);
    color:white;

    padding:14px 22px;

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;

    border-bottom:4px solid var(--accent);
}

header h1{
    font-size:1.1rem;
    font-family:'Lora',serif;
}

.controls{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

input,
select{
    background:#2a2622;
    color:white;
    border:1px solid var(--rule);

    padding:8px 10px;
    border-radius:6px;

    outline:none;
}

main{
    max-width:1100px;
    margin:28px auto;
    padding:0 18px;
}

.card{
    background:white;
    border-radius:10px;
    padding:24px;
    margin-bottom:24px;
    box-shadow:0 4px 14px var(--shadow);
}

.label{
    display:block;
    margin-bottom:12px;

    color:var(--accent);

    font-size:0.75rem;
    font-weight:bold;
    letter-spacing:1px;
    text-transform:uppercase;
}

#sourceText{
    white-space:pre-wrap;
    border-left:4px solid var(--rule);
    padding-left:16px;
    min-height:60px;
    margin-bottom:20px;
    color:#444;
}

button{
    background:var(--accent);
    color:white;
    border:none;

    padding:10px 16px;
    border-radius:6px;

    cursor:pointer;
}

button:hover{
    opacity:0.92;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:var(--paper-mid);
    padding:12px;
    text-align:left;
    border-bottom:2px solid var(--rule);
}

td{
    padding:18px;
    vertical-align:top;
    border-bottom:1px solid var(--rule);
    white-space:pre-wrap;
    word-break:break-word;
}

.row-num{
    color:#b37a5c;
    font-style:italic;
    margin-right:8px;
    font-weight:bold;
}

#loadingWrap{
    display:none;

    position:fixed;
    inset:0;

    background:rgba(247,243,238,0.92);

    justify-content:center;
    align-items:center;
    flex-direction:column;

    z-index:999;
}

.spinner{
    width:42px;
    height:42px;

    border:4px solid #ddd;
    border-top-color:var(--accent);

    border-radius:50%;

    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.error-msg{
    background:#fff3f3;
    color:#b22222;
    border:1px solid #ffcfcf;

    padding:14px;
    border-radius:8px;
}

.status{
    color:var(--accent);
    font-size:0.85rem;
}

@media(max-width:700px){

    table,
    tbody,
    tr,
    td{
        display:block;
        width:100%;
    }

    th{
        display:none;
    }

    tr{
        border-bottom:1px solid var(--rule);
        margin-bottom:16px;
        padding-bottom:16px;
    }

    td{
        border:none;
        padding:10px 0;
    }
}
</style>
</head>

<body>

<header>

    <h1>Parallel Translator Fast</h1>

    <div class="controls">

        <select id="modelSelect">

            <option value="gemini-2.0-flash-lite" selected>
                Gemini 2.0 Flash Lite
            </option>

            <option value="gemini-2.5-flash-lite">
                Gemini 2.5 Flash Lite
            </option>

        </select>

        <input
            type="password"
            id="apiKey"
            placeholder="Gemini API Key"
        />

    </div>

</header>

<main>

    <div class="card">

        <span class="label">
            Original Text
        </span>

        <div id="sourceText">
※ テキストを選択してブックマークレットを起動してください。
        </div>

        <div
            style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            flex-wrap:wrap;
            "
        >

            <button onclick="doTranslate()">
                翻訳
            </button>

            <div
                class="status"
                id="statusText"
            ></div>

        </div>

    </div>

    <div
        class="card"
        id="resultWrap"
        style="display:none;"
    >

        <div
            style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:16px;
            "
        >

            <span class="label">
                Translation Result
            </span>

            <button onclick="copyTable()">
                コピー
            </button>

        </div>

        <div id="result"></div>

    </div>

</main>

<div id="loadingWrap">

    <div class="spinner"></div>

    <p
        style="
        margin-top:16px;
        color:var(--accent);
        font-weight:bold;
        "
    >
        翻訳中...
    </p>

</div>

<script>

const apiKeyField =
    document.getElementById('apiKey');

const statusText =
    document.getElementById('statusText');

window.addEventListener('DOMContentLoaded',()=>{

    const savedKey =
        localStorage.getItem('gemini_key');

    if(savedKey){
        apiKeyField.value = savedKey;
    }

    const params =
        new URLSearchParams(window.location.search);

    const textFromUrl =
        params.get('text');

    const textFromStorage =
        localStorage.getItem('translator_text');

    const text =
        textFromUrl || textFromStorage;

    if(text){

        document.getElementById('sourceText')
            .textContent = text;

        setTimeout(()=>{
            doTranslate();
        },200);
    }
});

apiKeyField.addEventListener('change',(e)=>{

    localStorage.setItem(
        'gemini_key',
        e.target.value.trim()
    );
});

async function doTranslate(){

    const apiKey =
        apiKeyField.value.trim() ||
        localStorage.getItem('gemini_key');

    if(!apiKey){

        alert('APIキーを入力してください');

        return;
    }

    const text =
        document.getElementById('sourceText')
        .textContent
        .trim();

    if(
        !text ||
        text.startsWith('※')
    ){
        return;
    }

    const loadingWrap =
        document.getElementById('loadingWrap');

    const resultWrap =
        document.getElementById('resultWrap');

    const resultDiv =
        document.getElementById('result');

    loadingWrap.style.display = 'flex';

    statusText.textContent = '翻訳中...';

    const isJapanese =
        /[\u3040-\u30ff\u4e00-\u9fff]/.test(text);

    const targetLang =
        isJapanese ? 'English' : 'Japanese';

    const selectedModel =
        document.getElementById('modelSelect').value;

    try{

        const prompt = `
Translate the following text to ${targetLang}.

Output translation only.

Do not explain.
Do not add notes.
Do not add options.
Do not use markdown.

Text:
${text}
`;

        const url =
`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`;

        const response = await fetch(url,{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({

                contents:[
                    {
                        parts:[
                            {
                                text:prompt
                            }
                        ]
                    }
                ],

                generationConfig:{
                    temperature:0,
                    topP:0,
                    maxOutputTokens:2048
                }
            })
        });

        const data = await response.json();

        if(!response.ok){

            throw new Error(
                data.error?.message ||
                'API Error'
            );
        }

        const translated =
            data.candidates?.[0]
            ?.content
            ?.parts?.[0]
            ?.text
            ?.trim();

        if(!translated){

            throw new Error(
                '翻訳結果取得失敗'
            );
        }

        renderTable(
            text,
            translated,
            isJapanese
        );

        resultWrap.style.display = 'block';

        resultWrap.scrollIntoView({
            behavior:'smooth'
        });

        statusText.textContent = '完了';

    }catch(e){

        resultDiv.innerHTML = `
<div class="error-msg">
⚠️ ${escapeHtml(e.message)}
</div>
`;

        resultWrap.style.display = 'block';

        statusText.textContent = 'エラー';

    }finally{

        loadingWrap.style.display = 'none';
    }
}

function renderTable(original,translated,isJapanese){

    const html = `
<table>

<thead>
<tr>
<th>
${isJapanese ? '日本語' : 'English'}
</th>

<th>
${isJapanese ? 'English' : '日本語'}
</th>
</tr>
</thead>

<tbody>

<tr>

<td>
${escapeHtml(original)}
</td>

<td>
${escapeHtml(translated)}
</td>

</tr>

</tbody>

</table>
`;

    document.getElementById('result')
        .innerHTML = html;
}

function escapeHtml(str){

    return String(str || '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
}

async function copyTable(){

    try{

        const text =
            document.getElementById('result')
            .innerText;

        await navigator.clipboard.writeText(text);

        alert('コピーしました');

    }catch(e){

        alert('コピー失敗');
    }
}

</script>

</body>
</html>
