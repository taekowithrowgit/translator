<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parallel Translator Ultra Lite</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Lora:wght@400;600&display=swap');

:root{
    --ink:#1a1612;
    --paper:#f7f3ee;
    --paper-mid:#ede7de;
    --accent:#8b4a2f;
    --accent-light:#c47a5a;
    --rule:#c8b8a2;
    --shadow:rgba(26,22,18,0.12);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Serif JP',serif;
    line-height:1.7;
    min-height:100vh;
}

header{
    position:sticky;
    top:0;
    z-index:100;
    background:var(--ink);
    color:white;
    padding:14px 24px;
    border-bottom:4px solid var(--accent);

    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
}

header h1{
    font-family:'Lora',serif;
    font-size:1.1rem;
}

.controls{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

select,
input{
    background:#2a2622;
    border:1px solid var(--rule);
    color:white;
    padding:8px 10px;
    border-radius:6px;
    font-size:0.85rem;
    outline:none;
}

main{
    max-width:1000px;
    margin:30px auto;
    padding:0 20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:24px;
    margin-bottom:24px;
    box-shadow:0 4px 16px var(--shadow);
}

.label{
    display:block;
    margin-bottom:12px;
    color:var(--accent);
    font-size:0.75rem;
    font-weight:bold;
    text-transform:uppercase;
    letter-spacing:1px;
}

#sourceText{
    white-space:pre-wrap;
    border-left:4px solid var(--rule);
    padding-left:16px;
    color:#444;
    min-height:60px;
    margin-bottom:20px;
}

button{
    background:var(--accent);
    color:white;
    border:none;
    border-radius:6px;
    padding:10px 16px;
    cursor:pointer;
    font-size:0.85rem;
    transition:0.2s;
}

button:hover{
    opacity:0.9;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

th{
    background:var(--paper-mid);
    padding:12px;
    text-align:left;
    border-bottom:2px solid var(--rule);
    font-size:0.85rem;
}

td{
    padding:18px;
    vertical-align:top;
    border-bottom:1px solid var(--rule);
    word-break:break-word;
}

.row-num{
    color:var(--accent-light);
    margin-right:10px;
    font-style:italic;
    font-weight:bold;
}

#loadingWrap{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(247,243,238,0.92);

    justify-content:center;
    align-items:center;
    flex-direction:column;

    z-index:999;
}

.spinner{
    width:42px;
    height:42px;

    border:4px solid var(--rule);
    border-top-color:var(--accent);

    border-radius:50%;

    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.error-msg{
    background:#fff5f5;
    color:#b22222;
    border:1px solid #ffcfcf;
    padding:14px;
    border-radius:8px;
    font-size:0.9rem;
}

.status{
    margin-top:12px;
    color:var(--accent);
    font-size:0.85rem;
}

@media(max-width:700px){

    table,
    tbody,
    tr,
    td{
        display:block;
        width:100%;
    }

    th{
        display:none;
    }

    td{
        border-bottom:none;
        padding:12px 0;
    }

    tr{
        border-bottom:1px solid var(--rule);
        padding-bottom:16px;
        margin-bottom:16px;
    }
}
</style>
</head>

<body>

<header>

    <h1>Parallel Translator Ultra Lite</h1>

    <div class="controls">

        <select id="modelSelect">

            <option value="gemini-2.5-flash-lite" selected>
                Gemini 2.5 Flash Lite
            </option>

            <option value="gemini-2.0-flash-lite">
                Gemini 2.0 Flash Lite
            </option>

        </select>

        <input
            type="password"
            id="apiKey"
            placeholder="Gemini API Key"
        />

    </div>

</header>

<main>

    <div class="card">

        <span class="label">
            Original Text
        </span>

        <div id="sourceText">
※ テキストを選択してブックマークレットを起動してください。
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">

            <button onclick="doTranslate()">
                翻訳
            </button>

            <div class="status" id="statusText"></div>

        </div>

    </div>

    <div
        id="resultWrap"
        class="card"
        style="display:none;"
    >

        <div
            style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:16px;
            "
        >

            <span class="label">
                Translation Result
            </span>

            <button onclick="copyTable()">
                コピー
            </button>

        </div>

        <div id="result"></div>

    </div>

</main>

<div id="loadingWrap">

    <div class="spinner"></div>

    <p
        style="
        margin-top:16px;
        color:var(--accent);
        font-weight:bold;
        "
    >
        翻訳中...
    </p>

</div>

<script>

const apiKeyField =
    document.getElementById('apiKey');

const statusText =
    document.getElementById('statusText');

window.addEventListener('DOMContentLoaded',()=>{

    const savedKey =
        localStorage.getItem('gemini_key');

    if(savedKey){
        apiKeyField.value = savedKey;
    }

    const params =
        new URLSearchParams(window.location.search);

    const textFromUrl =
        params.get('text');

    const textFromStorage =
        localStorage.getItem('translator_text');

    const text =
        textFromUrl || textFromStorage;

    if(text){

        document.getElementById('sourceText')
            .textContent = text;

        setTimeout(()=>{
            doTranslate();
        },400);
    }
});

apiKeyField.addEventListener('change',(e)=>{

    localStorage.setItem(
        'gemini_key',
        e.target.value.trim()
    );
});

async function doTranslate(){

    const apiKey =
        apiKeyField.value.trim() ||
        localStorage.getItem('gemini_key');

    if(!apiKey){

        alert('APIキーを入力してください');

        return;
    }

    const text =
        document.getElementById('sourceText')
        .textContent
        .trim();

    if(
        !text ||
        text.startsWith('※')
    ){
        return;
    }

    const loadingWrap =
        document.getElementById('loadingWrap');

    const resultWrap =
        document.getElementById('resultWrap');

    const resultDiv =
        document.getElementById('result');

    loadingWrap.style.display = 'flex';

    statusText.textContent = '';

    const lines = text
        .split('\n')
        .map(v=>v.trim())
        .filter(v=>v);

    const isJapanese =
        /[\u3040-\u30ff\u4e00-\u9fff]/.test(text);

    const targetLang =
        isJapanese ? 'English' : 'Japanese';

    const selectedModel =
        document.getElementById('modelSelect').value;

    const results = [];

    try{

        for(let i=0;i<lines.length;i++){

            statusText.textContent =
                `翻訳中 ${i+1} / ${lines.length}`;

            const line = lines[i];

            const prompt = `
Translate the following text to ${targetLang}.

Output translation only.

Do not explain.
Do not add options.
Do not add notes.
Do not use markdown.

Text:
${line}
`;

            const url =
`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`;

            const response = await fetch(url,{

                method:'POST',

                headers:{
                    'Content-Type':'application/json'
                },

                body:JSON.stringify({

                    contents:[
                        {
                            parts:[
                                {
                                    text:prompt
                                }
                            ]
                        }
                    ],

                    generationConfig:{
                        temperature:0,
                        topP:0,
                        maxOutputTokens:300
                    }
                })
            });

            const data = await response.json();

            if(!response.ok){

                throw new Error(
                    data.error?.message ||
                    'API Error'
                );
            }

            const translated =
                data.candidates?.[0]
                ?.content
                ?.parts?.[0]
                ?.text
                ?.trim();

            if(!translated){

                throw new Error(
                    '翻訳結果取得失敗'
                );
            }

            results.push({

                original:line,
                translated:translated
            });

            await sleep(300);
        }

        renderTable(results,isJapanese);

        resultWrap.style.display = 'block';

        resultWrap.scrollIntoView({
            behavior:'smooth'
        });

        statusText.textContent =
            `完了 (${results.length} lines)`;

    }catch(e){

        resultDiv.innerHTML = `
<div class="error-msg">
⚠️ ${escapeHtml(e.message)}
</div>
`;

        resultWrap.style.display = 'block';

        statusText.textContent = 'エラー';

    }finally{

        loadingWrap.style.display = 'none';
    }
}

function renderTable(rows,isJapanese){

    let html = `
<table>
<thead>
<tr>
<th>${isJapanese ? '日本語' : 'English'}</th>
<th>${isJapanese ? 'English' : '日本語'}</th>
</tr>
</thead>
<tbody>
`;

    rows.forEach((row,i)=>{

        html += `
<tr>

<td>
<span class="row-num">
${i+1}
</span>
${escapeHtml(row.original)}
</td>

<td>
${escapeHtml(row.translated)}
</td>

</tr>
`;
    });

    html += `
</tbody>
</table>
`;

    document.getElementById('result')
        .innerHTML = html;
}

function escapeHtml(str){

    return String(str || '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
}

async function copyTable(){

    try{

        const text =
            document.getElementById('result')
            .innerText;

        await navigator.clipboard.writeText(text);

        alert('コピーしました');

    }catch(e){

        alert('コピー失敗');
    }
}

function sleep(ms){

    return new Promise(resolve=>{

        setTimeout(resolve,ms);

    });
}

</script>

</body>
</html>
