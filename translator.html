<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallel Translator Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
        :root {
            --ink: #1a1612; --paper: #f7f3ee; --paper-mid: #ede7de;
            --accent: #8b4a2f; --accent-light: #c47a5a; --rule: #c8b8a2;
            --shadow: rgba(26,22,18,0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--paper); color: var(--ink); font-family: 'Noto Serif JP', serif; line-height: 1.6; min-height: 100vh; }
        header { 
            background: var(--ink); color: var(--paper); padding: 15px 30px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--accent); position: sticky; top: 0; z-index: 100;
        }
        header h1 { font-family: 'Lora', serif; font-size: 1.2rem; }
        .controls { display: flex; gap: 10px; align-items: center; }
        select, input { 
            background: #2a2622; border: 1px solid var(--rule); color: white; 
            padding: 6px 10px; border-radius: 4px; font-size: 0.85rem; outline: none;
        }
        main { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px var(--shadow); margin-bottom: 25px; }
        .label { font-size: 0.75rem; font-weight: bold; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; display: block; }
        #sourceText { font-size: 1.05rem; white-space: pre-wrap; margin-bottom: 20px; border-left: 3px solid var(--rule); padding-left: 15px; color: #444; min-height: 50px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { background: var(--paper-mid); text-align: left; padding: 12px; font-size: 0.85rem; border-bottom: 2px solid var(--rule); }
        td { padding: 18px; border-bottom: 1px solid var(--rule); vertical-align: top; word-wrap: break-word; }
        .row-num { color: var(--accent-light); font-family: 'Lora', serif; font-size: 0.8rem; margin-right: 10px; font-style: italic; font-weight: bold; }
        #loadingWrap { 
            display: none; position: fixed; inset: 0; background: rgba(247,243,238,0.9);
            flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--rule); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { color: #b22222; background: #fff5f5; border: 1px solid #ffcccc; padding: 15px; border-radius: 6px; margin-top: 20px; font-size: 0.9rem; }
        .btn-copy { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-family: 'Lora', serif; }
        @media (max-width: 600px) { td { display: block; width: 100%; } th { display: none; } }
    </style>
</head>
<body>

<header>
    <h1>Parallel Translator</h1>
    <div class="controls">
        <select id="modelSelect">
            <option value="gemini-1.5-flash" selected>Gemini 1.5 Flash</option>
            <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash</option>
        </select>
        <input type="password" id="apiKey" placeholder="Enter API Key">
    </div>
</header>

<main>
    <div class="card">
        <span class="label">Original Text</span>
        <div id="sourceText">※ テキストを選択してブックマークレットを起動してください。</div>
        <div style="text-align: right;">
            <button class="btn-copy" onclick="doTranslate()">再翻訳を実行</button>
        </div>
    </div>

    <div id="resultWrap" class="card" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span class="label">Translation Results</span>
            <button class="btn-copy" onclick="copyTable()">表をコピー</button>
        </div>
        <div id="result"></div>
    </div>
</main>

<div id="loadingWrap">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-weight:bold; color: var(--accent);">翻訳中...</p>
</div>

<script>
    const apiKeyField = document.getElementById('apiKey');

    // 初期化
    window.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('gemini_key');
        if (savedKey) apiKeyField.value = savedKey;

        const params = new URLSearchParams(window.location.search);
        const text = params.get('text');
        if (text) {
            document.getElementById('sourceText').textContent = text;
            setTimeout(doTranslate, 600);
        }
    });

    apiKeyField.addEventListener('change', (e) => {
        localStorage.setItem('gemini_key', e.target.value.trim());
    });

    async function doTranslate() {
        const apiKey = apiKeyField.value.trim() || localStorage.getItem('gemini_key');
        if (!apiKey) { alert('APIキーを入力してください'); return; }

        const textDiv = document.getElementById('sourceText');
        const text = textDiv.textContent.trim();
        if (!text || text.startsWith('※')) return;

        // モデル名を取得
        const selectedModel = document.getElementById('modelSelect').value;
        const loadingWrap = document.getElementById('loadingWrap');
        const resultDiv = document.getElementById('result');
        const resultWrap = document.getElementById('resultWrap');

        loadingWrap.style.display = 'flex';

        const isJapanese = /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(text);
        const prompt = `Translate to ${isJapanese ? 'English' : 'Japanese'}. Split into logical segments. Output JSON only. Format: {"segments":[{"ja":"...", "en":"..."}]} Text: ${text}`;

        try {
            // URL組み立て: ここでモデル名を確実に挿入
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { 
                        temperature: 0.1,
                        responseMimeType: "application/json" 
                    }
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || 'API Error');
            }

            const jsonStr = data.candidates[0].content.parts[0].text;
            const content = JSON.parse(jsonStr);
            
            renderTable(content.segments);
            resultWrap.style.display = 'block';
            resultWrap.scrollIntoView({ behavior: 'smooth' });

        } catch (e) {
            resultDiv.innerHTML = `<div class="error-msg">⚠️ エラー: ${e.message}</div>`;
            resultWrap.style.display = 'block';
        } finally {
            loadingWrap.style.display = 'none';
        }
    }

    function renderTable(segments) {
        let html = `<table><thead><tr><th>日本語</th><th>English</th></tr></thead><tbody>`;
        segments.forEach((s, i) => {
            html += `<tr><td><span class="row-num">${i+1}</span>${escHtml(s.ja)}</td><td>${escHtml(s.en)}</td></tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('result').innerHTML = html;
    }

    function escHtml(s) {
        if (!s) return "";
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function copyTable() {
        const result = document.getElementById('result');
        const range = document.createRange();
        range.selectNode(result);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        alert('コピーしました');
        window.getSelection().removeAllRanges();
    }
</script>
</body>
</html>
